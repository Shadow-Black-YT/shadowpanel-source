version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shadowpanel
      POSTGRES_USER: shadow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U shadow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [sp_internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASSWORD}","ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [sp_internal]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - server_data:/data/servers
      - backup_data:/data/backups
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:5000:5000"
    networks: [sp_internal, sp_public]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AGENT_PORT: 8080
      AGENT_SECRET: ${AGENT_SECRET}
      STORAGE_PATH: /data/servers
      BACKUP_PATH: /data/backups
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - server_data:/data/servers
      - backup_data:/data/backups
    ports:
      - "127.0.0.1:8080:8080"
    networks: [sp_internal]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [sp_internal]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on: [backend, frontend]
    networks: [sp_internal, sp_public]

volumes:
  postgres_data:
  redis_data:
  server_data:
  backup_data:

networks:
  sp_internal: { internal: true }
  sp_public:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
