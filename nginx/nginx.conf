# shadowPanel v1.0 — NGINX Configuration
# Developed by Nystic.Shadow | Powered by shadowblack

worker_processes auto;
events { worker_connections 2048; use epoll; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # Upstream
  upstream backend  { server backend:5000; keepalive 16; }
  upstream frontend { server frontend:80;  keepalive 8; }

  server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN";
    add_header X-Content-Type-Options  "nosniff";
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";
    add_header X-Powered-By            "shadowblack";

    # API
    location /api/ {
      limit_req zone=api burst=60 nodelay;
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 30s;
      proxy_read_timeout    120s;
    }

    # Auth rate limiting
    location /api/v1/auth/login    { limit_req zone=auth burst=10; proxy_pass http://backend; proxy_set_header Host $host; }
    location /api/v1/auth/register { limit_req zone=auth burst=5;  proxy_pass http://backend; proxy_set_header Host $host; }

    # WebSocket
    location /ws {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
    }

    # Frontend (SPA)
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
